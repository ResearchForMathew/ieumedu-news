<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--color-bg);padding:24px;font-family:var(--font-sans);color:var(--fg-1)}
  .row{display:flex;gap:14px;align-items:flex-end}
  .box{background:var(--color-accent);opacity:.9;border-radius:4px}
  .b1{width:4px;height:4px}.b2{width:8px;height:8px}.b3{width:12px;height:12px}
  .b4{width:16px;height:16px}.b5{width:24px;height:24px}.b6{width:32px;height:32px}
  .b7{width:48px;height:48px}.b8{width:64px;height:64px}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .lbl{font-size:10px;color:var(--fg-3);letter-spacing:.08em;text-transform:uppercase;font-family:ui-monospace,Menlo,monospace}
</style></head>
<body>
<div class="row">
  <div class="col"><div class="box b1"></div><div class="lbl">1 · 4</div></div>
  <div class="col"><div class="box b2"></div><div class="lbl">2 · 8</div></div>
  <div class="col"><div class="box b3"></div><div class="lbl">3 · 12</div></div>
  <div class="col"><div class="box b4"></div><div class="lbl">4 · 16</div></div>
  <div class="col"><div class="box b5"></div><div class="lbl">6 · 24</div></div>
  <div class="col"><div class="box b6"></div><div class="lbl">8 · 32</div></div>
  <div class="col"><div class="box b7"></div><div class="lbl">12 · 48</div></div>
  <div class="col"><div class="box b8"></div><div class="lbl">16 · 64</div></div>
</div>
</body></html>
