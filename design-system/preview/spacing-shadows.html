<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--color-bg);padding:28px;font-family:var(--font-sans);color:var(--fg-1)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .cell{background:var(--color-surface);border:1px solid var(--color-border);border-radius:12px;height:86px;display:flex;align-items:center;justify-content:center;font-size:11px;letter-spacing:.08em;color:var(--fg-3);text-transform:uppercase}
  .xs{box-shadow:0 1px 2px rgba(13,31,31,.04)}
  .sm{box-shadow:0 2px 8px rgba(13,31,31,.05)}
  .md{box-shadow:0 8px 24px rgba(13,31,31,.06)}
  .lg{box-shadow:0 18px 48px rgba(13,31,31,.08)}
</style></head>
<body>
<div class="grid">
  <div class="cell xs">shadow-xs</div>
  <div class="cell sm">shadow-sm</div>
  <div class="cell md">shadow-md</div>
  <div class="cell lg">shadow-lg</div>
</div>
</body></html>
