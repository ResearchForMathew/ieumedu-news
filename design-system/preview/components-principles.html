<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--color-bg);padding:20px;font-family:var(--font-sans);color:var(--fg-1)}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .p{background:var(--color-surface);border:1px solid var(--color-border);border-top:2px solid var(--color-accent);border-radius:10px;padding:18px}
  .n{font-family:var(--font-serif);font-weight:500;font-size:26px;color:var(--color-accent);letter-spacing:-.02em;line-height:1;margin-bottom:10px;font-feature-settings:"lnum"}
  .t{font-family:var(--font-serif);font-size:15px;line-height:1.5;color:var(--fg-1);margin:0}
</style></head>
<body>
<div class="grid">
  <div class="p"><div class="n">01</div><p class="t">단편적인 건강 정보보다 감정과 발달의 맥락을 먼저 설명합니다.</p></div>
  <div class="p"><div class="n">02</div><p class="t">개인의 고통을 자기관리 실패처럼 다루지 않습니다.</p></div>
  <div class="p"><div class="n">03</div><p class="t">현장의 언어를 공공의 문장으로 번역합니다.</p></div>
  <div class="p"><div class="n">04</div><p class="t">사례는 철저히 익명화하며, 광고와 기사를 명확히 분리합니다.</p></div>
</div>
</body></html>
