<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--color-bg);padding:24px;font-family:var(--font-sans);color:var(--fg-1)}
  .r{display:flex;align-items:baseline;gap:16px;padding:10px 0;border-bottom:1px dashed var(--color-border)}
  .r:last-child{border:0}
  .lbl{font-size:10.5px;color:var(--fg-3);letter-spacing:.08em;text-transform:uppercase;width:96px;flex:none}
  .h2{font-family:var(--font-serif);font-weight:600;font-size:32px;line-height:1.2;letter-spacing:-.025em}
  .h3{font-family:var(--font-serif);font-weight:500;font-size:22px;line-height:1.3;letter-spacing:-.02em}
  .lead{font-size:17px;line-height:1.7;color:var(--fg-2)}
  .body{font-size:15px;line-height:1.8;color:var(--fg-1)}
  .meta{font-size:11px;letter-spacing:.08em;color:var(--fg-3);text-transform:uppercase}
</style></head>
<body>
<div class="r"><div class="lbl">h2</div><div class="h2">현장의 언어를 공공의 문장으로</div></div>
<div class="r"><div class="lbl">h3</div><div class="h3">잠들지 못하는 아이의 밤</div></div>
<div class="r"><div class="lbl">lead</div><div class="lead">잠을 잘 자고 싶다는 말은 마음을 쉬게 하고 싶다는 말과 닮아 있다.</div></div>
<div class="r"><div class="lbl">body</div><div class="body">밤은 늘 말없이 다가오지만, 그 고요는 좀처럼 비어 있지 않다.</div></div>
<div class="r"><div class="lbl">meta</div><div class="meta">2026.04.23 · 편집팀</div></div>
</body></html>
