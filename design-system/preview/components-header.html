<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--color-bg);padding:0;font-family:var(--font-sans);color:var(--fg-1)}
  .nav{position:relative;padding:14px 24px;background:rgba(245,242,238,.92);backdrop-filter:blur(10px);border-bottom:.5px solid var(--color-border);display:flex;justify-content:space-between;align-items:center;gap:24px}
  .brand{display:flex;align-items:center;gap:10px}
  .mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--color-accent),#97ae9f);color:#fff;display:grid;place-items:center;font-family:var(--font-serif);font-weight:700;font-size:14px}
  .name{font-family:var(--font-serif);font-weight:600;font-size:18px;letter-spacing:-.02em;line-height:1}
  .tag{font-family:var(--font-display);font-style:italic;font-size:10.5px;color:var(--fg-3);letter-spacing:.04em;margin-top:3px}
  .links{display:flex;gap:22px}
  .links a{font-size:13px;color:var(--fg-2);text-decoration:none;font-weight:400}
  .links a.on{color:var(--fg-1);font-weight:500}
  .outbound{padding:8px 14px;border:1px solid var(--color-border);border-radius:999px;font-size:12px;text-decoration:none;color:var(--fg-1);background:var(--color-surface)}
</style></head>
<body>
<div class="nav">
  <div class="brand">
    <div class="mark">이</div>
    <div><div class="name">이음교육저널</div><div class="tag">ieum education journal</div></div>
  </div>
  <div class="links">
    <a class="on">최신 기사</a><a>칼럼</a><a>아카이브</a><a>다루는 주제</a><a>독자 안내</a>
  </div>
  <a class="outbound">이음통합평생교육원</a>
</div>
</body></html>
