<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--color-bg);padding:22px;font-family:var(--font-sans);color:var(--fg-1)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .cell{aspect-ratio:1/1;border-radius:10px;overflow:hidden;position:relative;border:1px solid var(--color-border)}
  .cell img{width:100%;height:100%;object-fit:cover;display:block}
  .lbl{position:absolute;left:8px;bottom:8px;font-size:10px;color:#fff;background:rgba(13,31,31,.65);padding:3px 7px;border-radius:4px;letter-spacing:.04em;backdrop-filter:blur(4px)}
</style></head>
<body>
<div class="grid">
  <div class="cell"><img src="../assets/articles/infant-sleep.jpg"><span class="lbl">영유아 수면</span></div>
  <div class="cell"><img src="../assets/articles/youth-sleep.jpg"><span class="lbl">청소년 리듬</span></div>
  <div class="cell"><img src="../assets/articles/recovery-daily-life.png"><span class="lbl">회복</span></div>
  <div class="cell"><img src="../assets/articles/editor-note.jpg"><span class="lbl">에디터스 노트</span></div>
</div>
</body></html>
