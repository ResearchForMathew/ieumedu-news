<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--color-bg);padding:24px;font-family:var(--font-sans);color:var(--fg-1)}
  .head{max-width:640px}
  .k{font-family:var(--font-display);font-style:italic;font-weight:500;font-size:12px;letter-spacing:.18em;color:var(--color-accent);text-transform:lowercase;display:block;margin-bottom:8px}
  h2{font-family:var(--font-serif);font-weight:600;font-size:30px;line-height:1.2;letter-spacing:-.028em;margin:0 0 10px}
  p{margin:0;font-size:15px;line-height:1.7;color:var(--fg-2);max-width:52ch}
</style></head>
<body>
<div class="head">
  <span class="k">latest</span>
  <h2>최신 기사</h2>
  <p>현장에서 가장 자주 마주치는 질문과 해답을 묶었습니다.</p>
</div>
</body></html>
