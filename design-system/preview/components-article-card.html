<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--color-bg);padding:20px;font-family:var(--font-sans);color:var(--fg-1)}
  .card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:16px;overflow:hidden;box-shadow:0 8px 24px rgba(13,31,31,.06);max-width:320px;transition:all 260ms cubic-bezier(0.16,1,0.3,1)}
  .thumb{position:relative;aspect-ratio:16/10;overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover;transition:transform 420ms cubic-bezier(0.16,1,0.3,1)}
  .cat{position:absolute;left:12px;bottom:12px;padding:4px 10px;border-radius:4px;background:rgba(13,31,31,.6);color:#fff;font-size:11px;font-weight:500;letter-spacing:.04em;backdrop-filter:blur(6px)}
  .body{padding:16px 18px 18px}
  .meta{font-family:var(--font-display);font-style:italic;font-size:11px;letter-spacing:.18em;color:var(--color-accent);text-transform:lowercase;display:block;margin-bottom:8px}
  h3{font-family:var(--font-serif);font-weight:600;font-size:18px;line-height:1.32;letter-spacing:-.02em;margin:0 0 8px}
  p{margin:0;font-size:13px;line-height:1.65;color:var(--fg-2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
</style></head>
<body>
<div class="card">
  <div class="thumb"><img src="../assets/articles/infant-sleep.jpg" alt=""><span class="cat">영유아 수면</span></div>
  <div class="body">
    <span class="meta">latest</span>
    <h3>잠들기 어려운 아이의 밤, 훈련보다 공동조절이 먼저인 이유</h3>
    <p>잠들기 어려운 아이의 밤을 수면 훈련보다 공동조절의 관점에서 다시 읽습니다.</p>
  </div>
</div>
</body></html>
