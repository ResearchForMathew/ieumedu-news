<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--color-bg);padding:24px;font-family:var(--font-sans)}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .chip{padding:10px 16px;border-radius:999px;font-size:13px;font-weight:500;background:var(--color-surface);border:1px solid var(--color-border);color:var(--fg-1);transition:all 260ms cubic-bezier(0.16,1,0.3,1);cursor:pointer}
  .chip:hover{background:var(--color-accent);color:var(--color-accent-surface);border-color:var(--color-accent)}
  .chip.on{background:var(--color-accent-surface);border-color:var(--color-accent-light);color:var(--color-accent-dark)}
  .cat{display:inline-flex;align-items:center;padding:4px 10px;border-radius:4px;background:rgba(13,31,31,.55);color:#fff;font-size:11px;font-weight:500;letter-spacing:.04em;backdrop-filter:blur(6px)}
  .sub{margin-top:14px;font-size:11px;letter-spacing:.08em;color:var(--fg-3);text-transform:uppercase}
</style></head>
<body>
<div class="row">
  <span class="chip">영유아 수면</span>
  <span class="chip on">청소년 리듬</span>
  <span class="chip">발달과 애착</span>
  <span class="chip">통합교육</span>
  <span class="cat">회복</span>
  <span class="cat">사례 기록</span>
</div>
<div class="sub">topic chips (default / active) · category labels</div>
</body></html>
