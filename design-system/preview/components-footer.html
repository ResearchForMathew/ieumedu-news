<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--footer-bg);padding:22px 24px;font-family:var(--font-sans);color:var(--footer-text)}
  h3{font-family:var(--font-serif);font-weight:600;font-size:22px;letter-spacing:-.025em;margin:0 0 8px;color:var(--footer-heading)}
  p{margin:0;font-size:13px;line-height:1.7;color:var(--footer-text);opacity:.82}
  .k{font-family:var(--font-display);font-style:italic;font-size:11px;letter-spacing:.18em;color:var(--footer-muted);text-transform:lowercase;display:block;margin-bottom:8px}
  .grid{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:24px}
  ul{list-style:none;padding:0;margin:8px 0 0;display:grid;gap:6px}
  a{color:var(--footer-text);text-decoration:none;font-size:13px;opacity:.8;transition:color 260ms}
  a:hover{color:var(--color-accent-light);opacity:1}
</style></head>
<body>
<div class="grid">
  <div><h3>이음교육저널</h3><p>수면, 발달, 교육현장을 중심으로 기사와 칼럼을 싣습니다.</p></div>
  <div><span class="k">operating body</span><p>발행: 이음통합평생교육원</p><p>대표: 선애순</p></div>
  <div><span class="k">policy</span><ul><li><a>신문 소개</a></li><li><a>정정·반론</a></li><li><a>개인정보처리방침</a></li></ul></div>
</div>
</body></html>
