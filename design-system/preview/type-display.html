<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--color-bg);padding:28px;font-family:var(--font-sans);color:var(--fg-1)}
  .kicker{font-family:var(--font-display);font-style:italic;font-weight:500;font-size:12px;letter-spacing:.18em;color:var(--color-accent);text-transform:lowercase;display:block;margin-bottom:10px}
  h1{font-family:var(--font-serif);font-weight:600;font-size:44px;line-height:1.14;letter-spacing:-.028em;margin:0 0 6px}
  .sub{color:var(--fg-2);font-size:14px;margin-top:10px}
</style></head>
<body>
<span class="kicker">editor's note</span>
<h1>밤의 감정과 낮의 교육을<br>한 지면에서 읽는다</h1>
<div class="sub">Noto Serif KR · 600 · 44/1.14 · -0.028em</div>
</body></html>
