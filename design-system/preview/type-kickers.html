<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--color-bg);padding:28px;font-family:var(--font-sans);color:var(--fg-1)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .k{font-family:var(--font-display);font-style:italic;font-weight:500;letter-spacing:.18em;color:var(--color-accent);text-transform:lowercase;display:block;margin-bottom:10px}
  .k1{font-size:14px}.k2{font-size:12px}.k3{font-size:11px}
  .row{padding:14px 16px;background:var(--color-surface);border:1px solid var(--color-border);border-radius:12px}
  .lbl{font-size:10.5px;color:var(--fg-3);letter-spacing:.08em;text-transform:uppercase;margin-top:4px}
</style></head>
<body>
<div class="grid">
  <div class="row"><span class="k k1">latest</span><div class="lbl">14 · .18em</div></div>
  <div class="row"><span class="k k2">columns</span><div class="lbl">12 · .18em · default</div></div>
  <div class="row"><span class="k k3">principles</span><div class="lbl">11 · .18em</div></div>
</div>
</body></html>
