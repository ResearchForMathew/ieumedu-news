<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--color-bg);padding:28px;font-family:var(--font-sans);color:var(--fg-1)}
  .stack{display:flex;flex-direction:column;gap:22px}
  .card{padding:22px 24px;background:var(--color-surface);border:1px solid var(--color-border);border-radius:12px}
  .lbl{font-family:var(--font-display);font-style:italic;font-size:11px;letter-spacing:.18em;color:var(--color-accent);text-transform:lowercase;display:block;margin-bottom:14px}

  /* ── A · Typographic wordmark (primary) ───────────────────────── */
  .wm{display:inline-flex;flex-direction:column;align-items:flex-start;gap:4px}
  .wm-name{font-family:var(--font-serif);font-weight:600;font-size:32px;letter-spacing:-.03em;line-height:1;color:var(--fg-1)}
  .wm-rule{display:flex;align-items:center;gap:10px;margin-top:6px}
  .wm-rule::before{content:"";width:28px;height:1px;background:var(--color-accent)}
  .wm-en{font-family:var(--font-display);font-style:italic;font-weight:500;font-size:12px;letter-spacing:.18em;color:var(--color-accent);text-transform:lowercase}

  /* ── B · Monogram + wordmark (IE initials, not 이) ─────────────── */
  .lockup{display:flex;align-items:center;gap:14px}
  .mono{width:44px;height:44px;border-radius:10px;border:1px solid var(--color-accent);color:var(--color-accent);display:grid;place-items:center;font-family:var(--font-display);font-style:italic;font-weight:500;font-size:17px;letter-spacing:.02em;background:transparent}
  .lockup-text{display:flex;flex-direction:column;gap:4px}
  .lockup-name{font-family:var(--font-serif);font-weight:600;font-size:22px;letter-spacing:-.025em;line-height:1;color:var(--fg-1)}
  .lockup-tag{font-family:var(--font-display);font-style:italic;font-size:12px;color:var(--fg-3);letter-spacing:.06em}
</style></head>
<body>
<div class="stack">

  <div class="card">
    <span class="lbl">A · primary wordmark</span>
    <div class="wm">
      <div class="wm-name">이음교육저널</div>
      <div class="wm-rule"><span class="wm-en">em · education &amp; mind journal</span></div>
    </div>
  </div>

  <div class="card">
    <span class="lbl">B · lockup with monogram</span>
    <div class="lockup">
      <div class="mono">em</div>
      <div class="lockup-text">
        <div class="lockup-name">이음교육저널</div>
        <div class="lockup-tag">a journal of education &amp; psychology</div>
      </div>
    </div>
  </div>

</div>
</body></html>
