<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--color-bg);padding:24px;font-family:var(--font-sans);color:var(--fg-1)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .cell{background:var(--color-surface);padding:14px;display:flex;align-items:center;justify-content:center;border:1px solid var(--color-border);height:72px}
  .sm{border-radius:6px}.md{border-radius:10px}.lg{border-radius:16px}.xl{border-radius:24px}.pill{border-radius:999px}
  .lbl{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:.08em;color:var(--fg-3);text-transform:uppercase;font-family:ui-monospace,Menlo,monospace}
  .wrap{position:relative;padding-bottom:18px}
</style></head>
<body>
<div class="grid">
  <div class="wrap"><div class="cell sm"></div><div class="lbl">sm · 6</div></div>
  <div class="wrap"><div class="cell md"></div><div class="lbl">md · 10</div></div>
  <div class="wrap"><div class="cell lg"></div><div class="lbl">lg · 16</div></div>
  <div class="wrap"><div class="cell xl"></div><div class="lbl">xl · 24</div></div>
</div>
</body></html>
