    { href:'#', img:'../../assets/articles/case-sleep-gap.jpg', alt:'고요한 설경', category:'사례 기록', title:'잠은 오는데 왜 쉬지 못하는가', desc:'잠은 오지만 쉬지 못하는 한 사람의 밤을 통해 수면과 회복의 간격을 살핍니다.' },
    { href:'#', img:'../../assets/articles/recovery-daily-life.png', alt:'따뜻한 밤거리', category:'회복', title:'회복은 일상에서 시작된다', desc:'회복은 특별한 밤이 아니라 낮의 작은 멈춤과 조정에서 시작된다고 말합니다.' },
  ];

  return (
    <>
      <Header />
      <main id="main">
        <article className="column-bleed">
          <div className="container">
            <header className="column-masthead">
              <div className="column-number">columns · №03</div>
              <h1 className="column-title">회복은 일상에서<br/>시작된다</h1>
              <p className="column-sub">밤을 바꾸고 싶다면 밤만 관리해서는 충분하지 않다. 회복은 낮의 리듬을 다시 짜는 데서 시작된다.</p>
              <div className="column-ornament" />
              <div className="column-author-row">
                <span><strong>선애순</strong> · 편집장</span>
                <span>·</span>
                <span>2026.04.23</span>
                <span>·</span>
                <span>읽기 5분</span>
              </div>
            </header>

            <figure className="column-hero">
              <div className="column-hero__frame">
                <img src="../../assets/articles/recovery-daily-life.png" alt="따뜻한 조명이 비치는 밤거리 — 회복과 일상을 상징하는 칼럼 대표 이미지" />

                <span className="column-hero__cap-credit">illustration · 이음교육저널</span>

            <div className="column-body">
              <p className="lead-drop">잠을 이야기할 때 사람들은 거의 자동처럼 밤을 떠올린다. 불을 끄는 시간, 잠자리에 드는 자세, 눈을 감은 뒤의 몇 시간을 먼저 생각한다. 하지만 많은 밤의 각성은 그 순간부터 시작되지 않는다. 이미 낮 동안 몸과 마음은 충분히 긴장된 상태로 남아 있고, 밤은 그 흐름이 조금 다른 모습으로 이어지는 시간일 뿐이다.</p>

              <p>회복은 특별한 어느 밤에 갑자기 완성되지 않는다. 오히려 낮에 아주 작은 조정이 생길 때 밤은 조금 덜 버거워진다. 짧은 멈춤, 호흡이 제자리로 돌아오는 순간, 해야 할 일을 하나 덜어내는 선택, 감정을 미루지 않고 한번 확인해 보는 태도 같은 것들이다.</p>

              <p>회복은 결국 결과가 아니라 조건이다. 잘 잔 하룻밤이 모든 것을 바꾸기보다, 오늘 하루 어디에서도 쉬지 못했던 자신을 조금 더 이해하는 일에서 시작된다. 평범한 일상 속의 작은 느슨함이 밤의 깊이를 만든다.</p>
